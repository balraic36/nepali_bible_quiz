<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>बाइबल क्विज</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .question {
            color: #333;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #e2e6ea;
            border-color: #adb5bd;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .correct {
            background-color: #d4edda !important;
            color: #155724;
            border-color: #c3e6cb !important;
        }
        .wrong {
            background-color: #f8d7da !important;
            color: #721c24;
            border-color: #f5c6cb !important;
        }
        #result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            display: none; /* सुरुमा लुकाउनको लागि */
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="question">प्रश्न १: कुन दिनमा परमेश्वरले आकाशमण्डल र पृथ्वी सृष्टि गर्नुभयो?</div>
        
        <!-- विकल्पहरू -->
        <button class="option-btn" onclick="checkAnswer(this, false)">A. छैटौं दिन</button>
        <button class="option-btn" onclick="checkAnswer(this, true)">B. पहिलो दिन</button>
        <button class="option-btn" onclick="checkAnswer(this, false)">C. दोस्रो दिन</button>
        <button class="option-btn" onclick="checkAnswer(this, false)">D. आदिमा</button>

        <!-- नतिजा देखाउने बक्स -->
        <div id="result-box"></div>
    </div>

    <script>
        function checkAnswer(selectedButton, isCorrect) {
            const allButtons = document.querySelectorAll('.option-btn');
            const resultBox = document.getElementById('result-box');
            
            // एउटा उत्तर छानेपछि सबै बटन लक (Disable) गर्ने
            allButtons.forEach(btn => {
                btn.disabled = true;
                // सही उत्तरलाई आफैं हरियो रङ देखाउने
                if (btn.getAttribute('onclick').includes('true')) {
                    btn.classList.add('correct');
                }
            });

            // नतिजा बक्स देखाउने
            resultBox.style.display = "block";
            
            // सही र गलतको म्यासेज
            if (isCorrect) {
                selectedButton.classList.add('correct');
                resultBox.innerHTML = "✅ बधाई छ! हजुरको उत्तर एकदम सही छ।";
                resultBox.style.backgroundColor = "#d4edda";
                resultBox.style.color = "#155724";
            } else {
                selectedButton.classList.add('wrong');
                resultBox.innerHTML = "❌ माफ गर्नुहोला, यो गलत उत्तर हो! <br><br> सही उत्तर <strong>'B. पहिलो दिन'</strong> हो।";
                resultBox.style.backgroundColor = "#f8d7da";
                resultBox.style.color = "#721c24";
            }
        }
    </script>

</body>
</html>
